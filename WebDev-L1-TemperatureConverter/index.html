<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="converter-card">
        <h2>Temperature Converter</h2>
        <p class="subtitle">Convert temperatures seamlessly between Celsius, Fahrenheit, and Kelvin.</p>

        <form id="converterForm" onsubmit="return false;">
            <div class="input-group">
                <label for="degrees">Degrees / Value</label>
                <input type="number" id="degrees" placeholder="e.g., 32" step="any" required>
            </div>

            <div class="input-group">
                <label for="unit">Type / Unit</label>
                <select id="unit">
                    <option value="celsius">Celsius (°C)</option>
                    <option value="fahrenheit">Fahrenheit (°F)</option>
                    <option value="kelvin">Kelvin (K)</option>
                </select>
            </div>

            <button type="button" id="convertBtn" class="btn">Convert</button>
        </form>

        <div id="resultBox" class="result-box hidden">
            <h3>Converted Result:</h3>
            <p id="resultText"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
